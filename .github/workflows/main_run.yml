name: Launcher Android Tv

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip device tests)
        run: ./gradlew build --stacktrace -x :baselineprofile:connectedNonMinifiedReleaseAndroidTest -x :baselineprofile:connectedBenchmarkReleaseAndroidTest

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Run lint checks
        run: ./gradlew lint --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Upload build reports if failed
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: app/build/reports/
